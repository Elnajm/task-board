<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Task Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <h1>My Task Board</h1>
      <span id="task-counter" class="badge">0 tasks</span>
    </div>
    <div class="header-right">
      <label for="priority-filter">Filter:</label>
      <select id="priority-filter">
        <option value="all">All priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
  </header>

  <main class="board">

    <!-- TO DO column -->
    <section id="todo" class="column">
      <h2>To Do</h2>
      <ul id="todo-list" class="task-list"></ul>
      <button class="add-task-btn" data-column="todo">+ Add Task</button>
    </section>

    <!-- IN PROGRESS column -->
    <section id="inprogress" class="column">
      <h2>In Progress</h2>
      <ul id="inprogress-list" class="task-list"></ul>
      <button class="add-task-btn" data-column="inprogress">+ Add Task</button>
    </section>

    <!-- DONE column -->
    <section id="done" class="column">
      <h2>Done</h2>
      <ul id="done-list" class="task-list"></ul>
      <button class="add-task-btn" data-column="done">+ Add Task</button>
      <button id="clear-done-btn">Clear All</button>
    </section>

  </main>

  <!-- MODAL (hidden by default) -->
  <div id="modal-overlay" class="hidden">
    <div class="modal">
      <h2 id="modal-title">Add Task</h2>

      <label for="modal-title-input">Title</label>
      <input type="text" id="modal-title-input" placeholder="Task title" />

      <label for="modal-desc">Description</label>
      <textarea id="modal-desc" placeholder="Task description"></textarea>

      <label for="modal-priority">Priority</label>
      <select id="modal-priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>

      <label for="modal-due">Due Date</label>
      <input type="date" id="modal-due" />

      <div class="modal-actions">
        <button id="modal-save-btn">Save</button>
        <button id="modal-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="taskmanager.js"></script>
</body>
</html>
